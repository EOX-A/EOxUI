<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EOxUI Playground</title>
    <script type="module" src="lib/beercss"></script>
  </head>
  <body>
    <main class="responsive">
      <div class="large-space"></div>
      <h1 class="bold">EOxUI Playground</h1>
      <p class="large-text">
        This playground is intended to try out the library during development.
      </p>
      <p class="large-text">
        For full documentation about Beer CSS, please refer to
        <a href="https://www.beercss.com/" target="_blank" class="link"
          >https://www.beercss.com</a
        >
        and the
        <a
          href="https://github.com/beercss/beercss/tree/main/docs"
          target="_blank"
          class="link"
          >documentation files</a
        >.
      </p>
      <hr class="large" />
      <nav>
        <button>
          <i class="mdi mdi-home"></i>
          <span>Hello World!</span>
        </button>
        <label class="switch">
          <input type="checkbox" />
          <span></span>
        </label>
        <a>
          <i class="mdi mdi-home"></i>
          <div class="badge min"></div>
        </a>
        <label class="slider tiny">
          <input type="range" value="25" />
          <span></span>
        </label>
      </nav>
    </main>
  </body>
</html>
